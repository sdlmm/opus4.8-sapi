<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>食と毒の大冒険</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF7EE;
    --ink:#3A3A4A;
    --green:#4CAF7D;
    --green-d:#3C9168;
    --blue:#5BA9D8;
    --orange:#F2A03D;
    --danger:#E2615C;
    --danger-d:#C84B47;
    --card:#FFFFFF;
    --line:#3A3A4A;
    --shadow:rgba(58,58,74,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:"Zen Maru Gothic","Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;
    background:
      radial-gradient(circle at 12% 18%, rgba(91,169,216,.10) 0 22%, transparent 22%),
      radial-gradient(circle at 88% 78%, rgba(242,160,61,.10) 0 22%, transparent 22%),
      var(--paper);
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    padding:16px;min-height:100%;
  }
  .stage{
    width:100%;max-width:560px;background:var(--card);
    border:4px solid var(--line);border-radius:28px;
    box-shadow:0 12px 0 var(--shadow);
    overflow:hidden;position:relative;
  }

  /* ===== 共通パーツ ===== */
  .topbar{
    display:flex;align-items:center;gap:12px;
    padding:14px 18px;border-bottom:3px dashed #E4DCC8;
    background:linear-gradient(#FFFDF8,#FBF5E7);
  }
  .stage-label{
    font-weight:900;font-size:14px;color:#fff;background:var(--green);
    padding:5px 12px;border-radius:999px;border:2px solid var(--green-d);
    white-space:nowrap;
  }
  .hearts{display:flex;gap:4px;margin-left:auto;}
  .hearts svg{width:26px;height:26px;display:block;}
  .hp-text{font-weight:700;font-size:13px;color:#9A917C;margin-left:6px;}

  .body{padding:22px 20px 26px;}

  .scene-art{
    display:flex;justify-content:center;align-items:flex-end;
    gap:6px;background:linear-gradient(#EAF6F0,#DDF0E6);
    border:3px solid var(--line);border-radius:22px;
    padding:14px;margin-bottom:18px;min-height:172px;position:relative;
  }
  .scene-art .hero{width:128px;height:128px;}
  .scene-art .prop{width:104px;height:104px;}
  .speech{
    position:absolute;top:10px;left:14px;right:14px;
    background:#fff;border:3px solid var(--line);border-radius:16px;
    padding:9px 12px;font-weight:700;font-size:15px;line-height:1.4;
  }
  .speech:after{
    content:"";position:absolute;bottom:-13px;left:34px;
    width:18px;height:18px;background:#fff;
    border-right:3px solid var(--line);border-bottom:3px solid var(--line);
    transform:rotate(45deg);
  }

  .q-title{
    font-weight:900;font-size:19px;line-height:1.5;text-align:center;
    margin-bottom:16px;
  }
  .q-title .mark{color:var(--orange);}

  .choices{display:flex;flex-direction:column;gap:12px;}
  .choice{
    display:flex;align-items:center;gap:14px;width:100%;
    background:#fff;border:3px solid var(--line);border-radius:18px;
    padding:10px 14px;cursor:pointer;font-family:inherit;text-align:left;
    box-shadow:0 5px 0 var(--shadow);transition:transform .08s, box-shadow .08s;
  }
  .choice:hover{transform:translateY(-2px);box-shadow:0 7px 0 var(--shadow);}
  .choice:active{transform:translateY(3px);box-shadow:0 2px 0 var(--shadow);}
  .choice:focus-visible{outline:4px solid var(--blue);outline-offset:2px;}
  .choice .ico{width:62px;height:62px;flex:0 0 62px;
    background:#F4F8F2;border-radius:14px;display:flex;align-items:center;justify-content:center;}
  .choice .ico svg{width:54px;height:54px;}
  .choice .label{font-weight:700;font-size:16px;line-height:1.35;}
  .choice:disabled{cursor:default;opacity:.55;}
  .choice.is-safe{border-color:var(--green-d);background:#EEFBF3;opacity:1;}
  .choice.is-bad{border-color:var(--danger-d);background:#FDEEEC;opacity:1;}

  /* ===== けっか表示 ===== */
  .result{
    margin-top:18px;border-radius:20px;border:3px solid var(--line);
    padding:16px 16px 18px;animation:pop .25s ease;
  }
  @keyframes pop{from{transform:scale(.94);opacity:0;}to{transform:scale(1);opacity:1;}}
  .result.ok{background:#EAF8F0;}
  .result.ng{background:#FCEDEB;}
  .result-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .result-head svg{width:40px;height:40px;}
  .result-head .word{font-weight:900;font-size:20px;}
  .result.ok .word{color:var(--green-d);}
  .result.ng .word{color:var(--danger-d);}
  .result p{font-weight:500;font-size:15px;line-height:1.65;}
  .result .keyword{font-weight:900;color:var(--orange);}

  .next-btn,.start-btn{
    display:block;width:100%;margin-top:18px;
    font-family:inherit;font-weight:900;font-size:18px;color:#fff;
    background:var(--orange);border:3px solid #D9852A;border-radius:16px;
    padding:13px;cursor:pointer;box-shadow:0 5px 0 #C9791F;
    transition:transform .08s, box-shadow .08s;
  }
  .next-btn:hover,.start-btn:hover{transform:translateY(-2px);box-shadow:0 7px 0 #C9791F;}
  .next-btn:active,.start-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #C9791F;}
  .next-btn:focus-visible,.start-btn:focus-visible{outline:4px solid var(--blue);outline-offset:2px;}

  /* ===== タイトル / エンディング ===== */
  .screen{padding:30px 24px 34px;text-align:center;}
  .badge-top{font-weight:900;font-size:14px;color:var(--green-d);letter-spacing:2px;margin-bottom:6px;}
  .title{font-weight:900;line-height:1.2;}
  .title .big{font-size:38px;display:block;}
  .title .sub{font-size:21px;color:var(--blue);display:block;margin-top:2px;}
  .title-art{width:188px;height:188px;margin:14px auto 6px;}
  .lead{font-weight:700;font-size:15px;line-height:1.7;margin:8px auto 4px;max-width:400px;}
  .rules{
    text-align:left;background:#F4F8F2;border:3px solid var(--line);
    border-radius:16px;padding:14px 16px;margin:16px auto 4px;max-width:420px;
    font-weight:500;font-size:14px;line-height:1.7;
  }
  .rules b{color:var(--danger-d);}

  .end-art{width:170px;height:170px;margin:6px auto 4px;}
  .rank{font-weight:900;font-size:26px;margin:4px 0;}
  .rank.s{color:var(--orange);}
  .rank.a{color:var(--green-d);}
  .rank.b{color:var(--blue);}
  .end-msg{font-weight:700;font-size:15px;line-height:1.7;max-width:420px;margin:6px auto 0;}
  .culture{
    background:#FFF6E6;border:3px solid var(--line);border-radius:16px;
    padding:14px 16px;margin:16px auto 0;max-width:430px;text-align:left;
    font-weight:500;font-size:14px;line-height:1.7;
  }
  .culture .ttl{font-weight:900;color:var(--orange);display:block;margin-bottom:4px;}

  @media (max-width:420px){
    .title .big{font-size:31px;}
    .q-title{font-size:17px;}
    .choice .label{font-size:15px;}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important;}
  }
</style>
</head>

<script>

const $ = (sel,el=document)=>el.querySelector(sel);
function svg(id, cls=""){

    'heart-full':'0 0 100 92','heart-empty':'0 0 100 92',

    'nira-ok':'0 0 80 84','suisen-bad':'0 0 84 84',
    'fish':'0 0 84 84','puffer':'0 0 84 84'
  }[id] || '0 0 120 120';
  return `<svg class="${cls}" viewBox="${box}" aria-hidden="true"><use href="#${id}"/></svg>`;
}

const QUESTIONS = [
  {

      {svg:"potato-bad", label:"皮がみどり色で芽が出たもの", safe:false}
    ],
    okWord:"せいかい！",
    ok:"よく見たね。じゃがいもの<span class='keyword'>芽</span>やみどり色の皮には「ソラニン」という毒があるんだ。だから、お家では芽をしっかり取って、皮があおいところは食べないようにしているよ。",
    ngWord:"おなかいたい！",
    ng:"じゃがいもの<span class='keyword'>芽</span>やみどり色の皮には「ソラニン」という毒があるよ。食べると、おなかがいたくなることがあるんだ。芽は取りのぞいて食べようね。"
  },
  {
    place:"きのこの林",
    sceneProp:"mush-poison",
    speech:"いろんなきのこが生えている…",
    q:"安心して食べられるのはどれ？",
    choices:[
      {svg:"mush-ok", label:"お店で売っているしいたけ", safe:true},
      {svg:"mush-poison", label:"林に生えた赤いきのこ", safe:false},
      {svg:"mush-wild", label:"名前を知らないきのこ", safe:false}
    ],
    okWord:"せいかい！",
    ok:"そのとおり。<span class='keyword'>野生のきのこ</span>には毒を持つものが多くて、見た目だけでは大人でも見分けるのがむずかしいんだ。だから、お店で売っているものを選ぶのが一番あんしんだよ。",
    ngWord:"ふらふら…",
    ng:"<span class='keyword'>野生のきのこ</span>には毒を持つものがたくさんあるよ。「きれい」「おいしそう」でも、見た目で安全かどうかは決められないんだ。知らないきのこは、ぜったいに口に入れないでね。"
  },
  {
    place:"お家のだいどころ",
    sceneProp:"bread-bad",
    speech:"パンに何かついている…どうしよう？",
    q:"<span class='mark'>正しい</span>のはどれ？",
    choices:[
      {svg:"bread-bad", label:"カビの部分だけ取って食べる", safe:false},
      {svg:"bread-ok", label:"食べずにすてる", safe:true}
    ],
    okWord:"せいかい！",
    ok:"えらい判断。<span class='keyword'>カビ</span>は目に見えない細い糸を、パンの中までのばしているんだ。見えるところを取っても中に残っているから、もったいないけれど食べずにすてるのが安全だよ。",
    ngWord:"うっ…",
    ng:"<span class='keyword'>カビ</span>は、目に見えない細い糸をパンの中までのばしているよ。見える部分を取っても中に残っているから、おなかをこわすことがあるんだ。カビが生えたら食べずにすてようね。"
  },
  {
    place:"うらの畑",
    sceneProp:"suisen-bad",
    speech:"細長い葉っぱ。料理に使えるのは？",
    q:"食べても安心なのはどっち？",
    choices:[
      {svg:"nira-ok", label:"ニラ（おなじみの野菜）", safe:true},
      {svg:"suisen-bad", label:"スイセンの葉っぱ", safe:false}
    ],
    okWord:"せいかい！",
    ok:"ばっちり。じつは<span class='keyword'>スイセン</span>の葉はニラにそっくりで、まちがえて食べてしまう事故が本当にあるんだ。「自分で見分けられそう」と思っても、知らない植物は食べないのが約束だよ。",
    ngWord:"くらくら…",
    ng:"<span class='keyword'>スイセン</span>はニラにそっくりだけど毒があるんだ。にているからこそ、まちがえて食べる事故が起きてしまう。植物は「育てた人がわかっているもの」だけを食べようね。"
  },
  {
    place:"夕ごはんのテーブル",
    sceneProp:"fish",
    speech:"焼き魚だ！どうやって食べる？",
    q:"<span class='mark'>正しい</span>食べ方はどれ？",
    choices:[
      {svg:"fish", label:"骨をよけて、身を食べる", safe:true},
      {svg:"fish", label:"骨ごとガブッと食べる", safe:false}
    ],
    okWord:"せいかい！",
    ok:"いいね。魚の<span class='keyword'>骨</span>は食べられない部分（不可食部）。のどに刺さると痛いし、あぶないんだ。よくかんで、骨をていねいによけながら食べよう。",
    ngWord:"のどがいたい！",
    ng:"魚の<span class='keyword'>骨</span>は食べられない部分（不可食部）だよ。のどに刺さると、とても痛くてあぶないんだ。あわてず、骨をよけながらよくかんで食べようね。"
  },
  {
    place:"海べの食どう",
    sceneProp:"puffer",
    speech:"フグ料理だ！食べてもいいのは？",
    q:"安心して食べられるのはどっち？",
    choices:[
      {svg:"puffer", label:"免許を持つ料理人が作ったフグ", safe:true},
      {svg:"puffer", label:"自分でつって自分でさばいたフグ", safe:false}
    ],
    okWord:"せいかい！ ゴール！",
    ok:"その通り。<span class='keyword'>フグ</span>には強い毒があって、毒のない部分だけを取り分けるには特別な免許がいるんだ。だから、ちゃんと勉強した料理人が作ったものだけが食べられるんだよ。",
    ngWord:"ばたっ…",
    ng:"<span class='keyword'>フグ</span>には強い毒があって、安全に料理するには特別な免許が必要なんだ。免許のない人がさばいたフグはとてもあぶないよ。お店で、料理人が作ったものを食べようね。"
  }
];

/* ====== ステート ====== */
let state = { idx:0, hp:MAX_HP, answered:false };

/* ====== 画面えがき ====== */
const stage = $('#stage');

function heartsHTML(){
  let h="";
  for(let i=0;i<MAX_HP;i++){
    h += svg(i < state.hp ? 'heart-full' : 'heart-empty');
  }
  return `<div class="hearts" aria-label="げんき ${state.hp} / ${MAX_HP}">${h}<span class="hp-text">げんき</span></div>`;
}

function renderTitle(){
  stage.innerHTML = `
    <div class="screen">
      <div class="badge-top">食と毒の こうざ ゲーム</div>
      <h1 class="title"><span class="big">食と毒の大冒険</span><span class="sub">〜きみは食マスターになれるか〜</span></h1>
      <div class="title-art">${svg('hero-happy')}</div>
      <p class="lead">主人公の<b>たべ太</b>といっしょに「食の国」をたんけんしよう。<br>食べものには、ときどき<b>毒</b>がかくれているよ。</p>
      <div class="rules">
        <div>あそびかた</div>
        ・たべ太の<b>げんきハートは5こ</b>。<br>
        ・あぶないものを選ぶと、ハートが1つへるよ。<br>
        ・ぜんぶで6つの食べものクイズに挑戦！<br>
        ・ハートをのこして、ゴールを目ざそう。
      </div>
      <button class="start-btn" id="startBtn">冒険をはじめる</button>
    </div>`;
  $('#startBtn').onclick = ()=>{ state={idx:0,hp:MAX_HP,answered:false}; renderQuestion(); };
}

function renderQuestion(){
  const item = QUESTIONS[state.idx];
  state.answered = false;
  stage.innerHTML = `
    <div class="topbar">
      <span class="stage-label">ステージ ${state.idx+1} / ${QUESTIONS.length}・${item.place}</span>
      ${heartsHTML()}
    </div>
    <div class="body">
      <div class="scene-art">
        <div class="speech">${item.speech}</div>
        ${svg('hero-happy','hero')}
        ${svg(item.sceneProp,'prop')}
      </div>
      <h2 class="q-title">${item.q}</h2>
      <div class="choices" id="choices"></div>
      <div id="resultArea"></div>
    </div>`;

  const wrap = $('#choices');
  // 選択肢の順番をシャッフル
  const order = item.choices.map((c,i)=>i);
  for(let i=order.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [order[i],order[j]]=[order[j],order[i]]; }
  order.forEach(i=>{
    const c = item.choices[i];
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.innerHTML = `<span class="ico">${svg(c.svg)}</span><span class="label">${c.label}</span>`;
    btn.onclick = ()=>handleAnswer(c, btn);
    wrap.appendChild(btn);
  });
}

function handleAnswer(choice, btn){
  if(state.answered) return;
  state.answered = true;
  const item = QUESTIONS[state.idx];

  // ボタンを全部とめる＆色づけ
  $('#choices').querySelectorAll('.choice').forEach((b,i)=>{
    b.disabled = true;
  });
  btn.classList.add(choice.safe ? 'is-safe' : 'is-bad');

  // ダメージ処理＆ハート更新
  if(!choice.safe){
    state.hp = Math.max(0, state.hp - 1);
    // ハート再描画
    const old = stage.querySelector('.hearts');
    if(old){ old.outerHTML = heartsHTML(); }
    // たべ太をダメージ顔に
    const hero = stage.querySelector('.scene-art .hero use');
    if(hero){ hero.setAttribute('href','#hero-hurt'); }
  }

  const ok = choice.safe;
  const result = document.createElement('div');
  result.className = 'result ' + (ok?'ok':'ng');
  result.innerHTML = `
    <div class="result-head">
      ${svg(ok?'mark-ok':'mark-ng')}
      <span class="word">${ok?item.okWord:item.ngWord}</span>
    </div>
    <p>${ok?item.ok:item.ng}</p>
    <button class="next-btn" id="nextBtn">${state.idx < QUESTIONS.length-1 ? 'つぎへ すすむ' : 'けっかを見る'}</button>`;
  $('#resultArea').appendChild(result);
  result.scrollIntoView({behavior:'smooth', block:'nearest'});

  $('#nextBtn').onclick = ()=>{
    if(state.idx < QUESTIONS.length-1){ state.idx++; renderQuestion(); }
    else { renderEnding(); }
  };
}

function renderEnding(){
  let rank, cls, art, msg;
  if(state.hp === MAX_HP){
    rank="食マスター！"; cls="s"; art="hero-happy";
    msg="ノーダメージでゴール！ 食べものにかくれた毒を、ぜんぶ見ぬいたね。きみはもう立派な食マスターだ。";
  }else if(state.hp >= 3){
    rank="食ハカセ"; cls="a"; art="hero-happy";
    msg="あぶないところもあったけれど、しっかりゴール！ きょうおぼえたことを、お家の人にも教えてあげよう。";
  }else if(state.hp >= 1){
    rank="食みならい"; cls="b"; art="hero-happy";
    msg="ゴールできたね！ 食べものには毒がかくれていることがある、とわかったのが大きな一歩。もう一回ちょうせんしてみよう。";
  }else{
    rank="また ちょうせん！"; cls="b"; art="hero-hurt";
    msg="ハートがなくなっちゃった…。でも、どれがあぶないかを知ったきみは、もう前のきみとはちがうよ。もう一度たんけんしてみよう。";
  }

  stage.innerHTML = `
    <div class="screen">
      <div class="badge-top">けっか はっぴょう</div>
      <div class="end-art">${svg(art)}</div>
      <div class="rank ${cls}">${rank}</div>
      <p style="font-weight:700">のこったげんき ${state.hp} / ${MAX_HP}</p>
      <div class="hearts" style="justify-content:center;margin:8px 0 0">${(()=>{let h="";for(let i=0;i<MAX_HP;i++)h+=svg(i<state.hp?'heart-full':'heart-empty');return h;})()}</div>
      <p class="end-msg">${msg}</p>
      <div class="culture">
        <span class="ttl">わかったこと ―「食文化」って？</span>
        毒のある食べもの、いたんだりカビたりした食べもの、食べられない部分（骨や皮）…。
        わたしたちのご先祖さまは、長い時間をかけて「どれが食べられて、どれがあぶないか」を見つけ、
        調理のしかたや約束ごとを作ってきたんだ。それが<b style="color:#3C9168">「食文化」</b>。
        ふだんのご飯は、たくさんの知恵に守られているんだね。
      </div>
      <button class="start-btn" id="againBtn">もう一度 あそぶ</button>
    </div>`;
  $('#againBtn').onclick = renderTitle;
}

/* ====== スタート ====== */
renderTitle();
</script>
</body>
</html>
